[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vibe-flow"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.135.2",
    "mcp>=1.26.0",
    "openai>=2.29.0",
    "python-dotenv>=1.2.2",
    "requests>=2.32.5",
    "uvicorn>=0.42.0",
]

[project.scripts]
vibe-flow = "vibe_flow.cli:main"

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",   # "one blank line before class docstring" — conflicts with D211 (no blank line)
    "D213",   # "summary on second line" — conflicts with D212 (summary on first line)
    "COM812", # "trailing comma missing" — conflicts with ruff format which manages commas
]

[tool.ruff.lint.per-file-ignores]
"scratch/**" = [
    "TD",     # TODO comments are intentional reminders in scratch experiments
    "FIX",    # FIXME comments are intentional reminders in scratch experiments
    "INP001", # "missing __init__.py" — scratch scripts are not packages
    "T201",   # "print found" — scratch scripts use print for output
]

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[dependency-groups]
dev = [
    "ruff>=0.15.7",
]
