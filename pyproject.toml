[project]
name = "vibe-flow"
version = "0.1.0"
description = "Python rewrite of Claude Code's core agent logic"
requires-python = ">=3.12"
dependencies = [
    "openai",
    "pydantic>=2.0",
    "python-dotenv>=1.2.2",
]

[project.scripts]
vibe-flow = "src.agent:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
